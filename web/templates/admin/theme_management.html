{{define "admin/theme_management"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Management - Admin Panel</title>
    <link href="/static/css/admin.css" rel="stylesheet">
    <link href="/static/css/theme-management.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        {{template "admin/sidebar" .}}
        
        <main class="admin-main">
            <div class="admin-header">
                <h1>Theme Management</h1>
                <button id="create-theme-btn" class="btn btn-primary">Create New Theme</button>
            </div>

            <div class="theme-management-container">
                <!-- Theme List -->
                <div class="theme-list-section">
                    <h2>Available Themes</h2>
                    <div id="theme-list" class="theme-list">
                        <!-- Themes will be loaded here -->
                    </div>
                </div>

                <!-- Theme Customization -->
                <div class="theme-customization-section">
                    <h2>Theme Customization</h2>
                    <div class="customization-tabs">
                        <button class="tab-btn active" data-tab="colors">Colors</button>
                        <button class="tab-btn" data-tab="typography">Typography</button>
                        <button class="tab-btn" data-tab="layout">Layout</button>
                        <button class="tab-btn" data-tab="branding">Branding</button>
                        <button class="tab-btn" data-tab="custom">Custom CSS/JS</button>
                    </div>
                    
                    <div class="tab-content">
                        <!-- Colors Tab -->
                        <div id="colors-tab" class="tab-pane active">
                            <div class="color-picker-grid">
                                <div class="color-picker-item">
                                    <label>Primary Color</label>
                                    <input type="color" id="primary-color" value="#3b82f6">
                                </div>
                                <div class="color-picker-item">
                                    <label>Secondary Color</label>
                                    <input type="color" id="secondary-color" value="#64748b">
                                </div>       
                         <div class="color-picker-item">
                                    <label>Accent Color</label>
                                    <input type="color" id="accent-color" value="#f59e0b">
                                </div>
                                <div class="color-picker-item">
                                    <label>Background Color</label>
                                    <input type="color" id="background-color" value="#ffffff">
                                </div>
                                <div class="color-picker-item">
                                    <label>Text Color</label>
                                    <input type="color" id="text-color" value="#1e293b">
                                </div>
                                <div class="color-picker-item">
                                    <label>Border Color</label>
                                    <input type="color" id="border-color" value="#e2e8f0">
                                </div>
                            </div>
                        </div>

                        <!-- Typography Tab -->
                        <div id="typography-tab" class="tab-pane">
                            <div class="form-group">
                                <label for="font-family">Font Family</label>
                                <select id="font-family">
                                    <option value="Inter, system-ui, sans-serif">Inter</option>
                                    <option value="Arial, sans-serif">Arial</option>
                                    <option value="Georgia, serif">Georgia</option>
                                    <option value="'Times New Roman', serif">Times New Roman</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="base-font-size">Base Font Size</label>
                                <input type="text" id="base-font-size" value="16px">
                            </div>
                            <div class="form-group">
                                <label for="line-height">Line Height</label>
                                <input type="number" id="line-height" value="1.6" step="0.1">
                            </div>
                        </div>

                        <!-- Layout Tab -->
                        <div id="layout-tab" class="tab-pane">
                            <div class="form-group">
                                <label for="max-width">Max Width</label>
                                <input type="text" id="max-width" value="1200px">
                            </div>
                            <div class="form-group">
                                <label for="sidebar-width">Sidebar Width</label>
                                <input type="text" id="sidebar-width" value="300px">
                            </div>
                            <div class="form-group">
                                <label>
                                    <input type="checkbox" id="show-sidebar" checked>
                                    Show Sidebar
                                </label>
                            </div>
                        </div>

                        <!-- Branding Tab -->
                        <div id="branding-tab" class="tab-pane">
                            <div class="form-group">
                                <label for="site-name">Site Name</label>
                                <input type="text" id="site-name" value="News Website">
                            </div>
                            <div class="form-group">
                                <label for="site-description">Site Description</label>
                                <input type="text" id="site-description" value="Your trusted source for news">
                            </div>
                            <div class="form-group">
                                <label for="logo-url">Logo URL</label>
                                <input type="url" id="logo-url">
                            </div>
                        </div>

                        <!-- Custom CSS/JS Tab -->
                        <div id="custom-tab" class="tab-pane">
                            <div class="form-group">
                                <label for="custom-css">Custom CSS</label>
                                <textarea id="custom-css" rows="10" placeholder="/* Add your custom CSS here */"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="custom-js">Custom JavaScript</label>
                                <textarea id="custom-js" rows="10" placeholder="// Add your custom JavaScript here"></textarea>
                            </div>
                        </div>
                    </div>
                    
                    <div class="customization-actions">
                        <button id="preview-theme-btn" class="btn btn-secondary">Preview</button>
                        <button id="save-theme-btn" class="btn btn-primary">Save Changes</button>
                    </div>
                </div>

                <!-- Live Preview -->
                <div class="theme-preview-section">
                    <h2>Live Preview</h2>
                    <div id="theme-preview" class="theme-preview">
                        <!-- Preview will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/admin/theme-management.js"></script>
</body>
</html>
{{end}}
