# Nginx configuration for static-first serving with dynamic fallback
# This configuration prioritizes serving static HTML files when available,
# falling back to the dynamic Go application when static files don't exist

upstream backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

server {
    listen 80;
    server_name localhost;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    # Static assets with long cache
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Enable compression for static assets
        gzip_static on;
        
        # Security for static files
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Homepage - try static first, then dynamic
    location = / {
        limit_req zone=static burst=20 nodelay;
        
        # Try static file first
        try_files /static-html/index.html @backend;
        
        # Cache static homepage for 5 minutes
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Language-specific homepages
    location ~ ^/(en|ar|fa)/?$ {
        limit_req zone=static burst=20 nodelay;
        
        # Try language-specific static file first
        try_files /static-html/$1/index.html @backend;
        
        # Cache for 5 minutes
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Article pages - static first with dynamic fallback
    location ~ ^/articles/([a-z0-9-]+)/?$ {
        limit_req zone=static burst=10 nodelay;
        
        set $article_slug $1;
        
        # Try static article file first, then dynamic
        try_files /static-html/articles/$article_slug/index.html @backend;
        
        # Cache static articles for 1 hour
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        
        # Add article-specific headers
        add_header X-Content-Type "article";
    }
    
    # Category pages - static first with pagination support
    location ~ ^/categories/([a-z0-9-]+)(?:/page-(\d+))?/?$ {
        limit_req zone=static burst=10 nodelay;
        
        set $category_slug $1;
        set $page_num $2;
        
        # Handle pagination
        if ($page_num = "") {
            set $page_num "1";
        }
        
        # Try static category file first
        if ($page_num = "1") {
            try_files /static-html/categories/$category_slug/index.html @backend;
        }
        if ($page_num != "1") {
            try_files /static-html/categories/$category_slug/page-$page_num.html @backend;
        }
        
        # Cache for 30 minutes
        expires 30m;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Tag pages - static first with pagination support
    location ~ ^/tags/([a-z0-9-]+)(?:/page-(\d+))?/?$ {
        limit_req zone=static burst=10 nodelay;
        
        set $tag_slug $1;
        set $page_num $2;
        
        # Handle pagination
        if ($page_num = "") {
            set $page_num "1";
        }
        
        # Try static tag file first
        if ($page_num = "1") {
            try_files /static-html/tags/$tag_slug/index.html @backend;
        }
        if ($page_num != "1") {
            try_files /static-html/tags/$tag_slug/page-$page_num.html @backend;
        }
        
        # Cache for 30 minutes
        expires 30m;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # API endpoints - always dynamic with rate limiting
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        
        # No caching for API endpoints
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
    
    # Admin endpoints - always dynamic with stricter rate limiting
    location /admin/ {
        limit_req zone=api burst=2 nodelay;
        
        # No caching
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    
    # Fallback to dynamic backend for all other requests
    location @backend {
        # Add header to indicate this was served dynamically
        add_header X-Served-By "dynamic";
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /var/www/error-pages;
        internal;
    }
    
    location = /50x.html {
        root /var/www/error-pages;
        internal;
    }
}

