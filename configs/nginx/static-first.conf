# Nginx configuration for static-first serving with dynamic fallback
# 
# INSTALLATION:
# 1. Replace {{DOMAIN}} with your domain (e.g., example.com)
# 2. Replace {{APP_PATH}} with your application path (e.g., /home/newsapp/news-website)
# 3. Copy to /etc/nginx/sites-available/{{DOMAIN}}.conf
# 4. Create symlink: ln -s /etc/nginx/sites-available/{{DOMAIN}}.conf /etc/nginx/sites-enabled/
# 5. Obtain SSL certificate: certbot --nginx -d {{DOMAIN}} -d www.{{DOMAIN}}
# 6. Test: nginx -t
# 7. Reload: systemctl reload nginx
#
# STATIC FILE VERIFICATION:
# Check X-Static-Cache header in browser DevTools:
#   - HIT: Served from pre-generated static HTML
#   - MISS: Served dynamically from Go application
#   - BYPASS: Admin/API routes (never cached)
#   - ASSET: Static assets (CSS, JS, images)

# HTTP to HTTPS redirect + www redirect
server {
    listen 80;
    server_name {{DOMAIN}} www.{{DOMAIN}};

    # Let's Encrypt challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all HTTP traffic to HTTPS (non-www)
    location / {
        return 301 https://{{DOMAIN}}$request_uri;
    }
}

# www to non-www redirect (HTTPS)
server {
    listen 443 ssl http2;
    server_name www.{{DOMAIN}};

    # SSL certificate paths
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://{{DOMAIN}}$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name {{DOMAIN}};

    # SSL certificate paths
    ssl_certificate /etc/letsencrypt/live/{{DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Note: Security headers are added per-location to ensure they're always present
    # (nginx doesn't inherit server-level add_header into locations that define their own)

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/html
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Root directory
    root {{APP_PATH}};

    # ============================================
    # STATIC ASSETS (CSS, JS, images)
    # ============================================
    location /static/ {
        alias {{APP_PATH}}/web/static/;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Static-Cache "ASSET" always;
        gzip_static on;
    }

    # Uploaded images
    location /uploads/ {
        alias {{APP_PATH}}/web/static/uploads/images/;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Static-Cache "ASSET" always;
    }

    # Legacy /images/ redirect to /uploads/
    location /images/ {
        return 301 /uploads$request_uri;
    }

    # ============================================
    # HOMEPAGE - Static first, dynamic fallback
    # ============================================
    location = / {
        try_files /static-html/index.html @dynamic;
        
        # Static cache indicator
        add_header X-Static-Cache "HIT" always;
        add_header Cache-Control "public, max-age=60" always;
        
        # Security headers (match Go application)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header X-Download-Options "noopen" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'none'; worker-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; manifest-src 'self'" always;
        add_header Expect-CT "max-age=86400, enforce" always;
    }

    # ============================================
    # ARTICLE PAGES - Static first, dynamic fallback
    # ============================================
    location ~ ^/article/([^/]+)/?$ {
        try_files /static-html/articles/$1/index.html @dynamic;
        
        # Static cache indicator
        add_header X-Static-Cache "HIT" always;
        add_header Cache-Control "public, max-age=300" always;
        
        # Security headers (match Go application)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header X-Download-Options "noopen" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'none'; worker-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; manifest-src 'self'" always;
        add_header Expect-CT "max-age=86400, enforce" always;
    }

    # ============================================
    # CATEGORY PAGES - Static first, dynamic fallback
    # ============================================
    location ~ ^/category/([^/]+)/?$ {
        try_files /static-html/categories/$1/index.html @dynamic;
        
        # Static cache indicator
        add_header X-Static-Cache "HIT" always;
        add_header Cache-Control "public, max-age=300" always;
        
        # Security headers (match Go application)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header X-Download-Options "noopen" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'none'; worker-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; manifest-src 'self'" always;
        add_header Expect-CT "max-age=86400, enforce" always;
    }

    # ============================================
    # TAG PAGES - Static first, dynamic fallback
    # ============================================
    location ~ ^/tag/([^/]+)/?$ {
        try_files /static-html/tags/$1/index.html @dynamic;
        
        # Static cache indicator
        add_header X-Static-Cache "HIT" always;
        add_header Cache-Control "public, max-age=300" always;
        
        # Security headers (match Go application)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header X-Download-Options "noopen" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'none'; worker-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; manifest-src 'self'" always;
        add_header Expect-CT "max-age=86400, enforce" always;
    }

    # ============================================
    # ADMIN ROUTES - Always dynamic (no caching)
    # ============================================
    location /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Static-Cache "BYPASS" always;
    }

    # ============================================
    # API ROUTES - Always dynamic
    # ============================================
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;

        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Static-Cache "BYPASS" always;
    }

    # ============================================
    # RSS FEEDS - Always dynamic
    # ============================================
    location ~ ^/(rss|feed) {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=300" always;
        add_header X-Static-Cache "BYPASS" always;
    }

    # ============================================
    # SITEMAPS - Always dynamic
    # ============================================
    location ~ ^/sitemap {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Static-Cache "BYPASS" always;
    }

    # ============================================
    # HEALTH CHECK - No logging
    # ============================================
    location /health {
        access_log off;
        proxy_pass http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ============================================
    # DEFAULT - Proxy to Go application
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        add_header X-Static-Cache "MISS" always;
    }

    # ============================================
    # NAMED LOCATION - Dynamic fallback
    # ============================================
    location @dynamic {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        add_header X-Static-Cache "MISS" always;
    }

    # ============================================
    # SECURITY - Deny access to sensitive files
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
