services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-news}_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-newsdb}
      POSTGRES_USER: ${DB_USER:-newsapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-newsapp} -d ${DB_NAME:-newsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  redis:
    image: ghcr.io/dragonflydb/dragonfly:latest
    container_name: ${PROJECT_NAME:-news}_redis
    command: dragonfly --logtostderr --maxmemory=512mb --cache_mode=true
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: ${PROJECT_NAME:-news}_app
    environment:
      # Viper uses NEWS_ prefix
      - NEWS_SERVER_MODE=release
      - NEWS_APP_ENVIRONMENT=production
      - NEWS_APP_BASE_URL=https://${DOMAIN}
      # Database config
      - NEWS_DATABASE_HOST=postgres
      - NEWS_DATABASE_PORT=5432
      - NEWS_DATABASE_DBNAME=${DB_NAME:-newsdb}
      - NEWS_DATABASE_USER=${DB_USER:-newsapp}
      - NEWS_DATABASE_PASSWORD=${DB_PASSWORD}
      - NEWS_DATABASE_SSLMODE=disable
      # Cache config (DragonflyDB)
      - NEWS_CACHE_HOST=redis
      - NEWS_CACHE_PORT=6379
      # JWT config
      - NEWS_JWT_SECRET=${JWT_SECRET}
      # Admin credentials
      - NEWS_ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - NEWS_ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      # Search disabled for now
      - NEWS_SEARCH_ENABLED=false
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-news}_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  logs_data:
  certbot_www:

networks:
  app_network:
    driver: bridge
