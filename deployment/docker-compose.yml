services:
  postgres:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-news}_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-newsdb}
      POSTGRES_USER: ${DB_USER:-newsapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-newsapp} -d ${DB_NAME:-newsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-news}_redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: ${PROJECT_NAME:-news}_app
    environment:
      - NEWS_SERVER_MODE=release
      - NEWS_APP_ENVIRONMENT=production
      - NEWS_APP_BASE_URL=https://${DOMAIN}
      - NEWS_DATABASE_HOST=postgres
      - NEWS_DATABASE_PORT=5432
      - NEWS_DATABASE_DBNAME=${DB_NAME:-newsdb}
      - NEWS_DATABASE_USER=${DB_USER:-newsapp}
      - NEWS_DATABASE_PASSWORD=${DB_PASSWORD}
      - NEWS_DATABASE_SSLMODE=disable
      - NEWS_CACHE_HOST=redis
      - NEWS_CACHE_PORT=6379
      - NEWS_JWT_SECRET=${JWT_SECRET}
      - NEWS_ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - NEWS_ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123!}
      - NEWS_SEARCH_ENABLED=false
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app_network

volumes:
  postgres_data:
  redis_data:
  uploads:
  logs:

networks:
  app_network:
    driver: bridge
